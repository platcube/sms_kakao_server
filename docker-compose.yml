services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sms_kakao_server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      TS_NODE_BASEURL: ./dist
    ports:
      - "127.0.0.1:${PORT:-5100}:${PORT:-5100}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${PORT:-5100}/api/v1/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
