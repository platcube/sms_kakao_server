paths:
  /api/v1/client/kakao/templates:
    get:
      tags:
        - Client Kakao
      summary: 카카오 템플릿 목록 조회
      description: |
        현재 로그인한 외주사 사용자의 client에 매핑된 카카오 템플릿 목록을 조회합니다.
        prcompany가 아니라 우리 DB 기준으로 조회합니다.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum:
              - DRAFT
              - PENDING
              - APPROVED
              - REJECTED
              - ARCHIVED
          description: 템플릿 상태 필터
        - in: query
          name: templateCode
          schema:
            type: string
          description: 템플릿 코드 부분 검색. 전체는 빈값
        - in: query
          name: name
          schema:
            type: string
          description: 템플릿명 부분 검색. 전체는 빈값
      responses:
        "200":
          description: 목록 조회 성공
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                  - error
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    required:
                      - items
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            templateCode:
                              type: string
                              example: SH-001
                            name:
                              type: string
                              example: (쇼핑몰)결제완료
                            status:
                              type: string
                              example: APPROVED
                            category:
                              type: string
                              nullable: true
                              example: 서비스이용/이용안내/공지
                            profile:
                              type: object
                              properties:
                                profileKey:
                                  type: string
                                  example: 0b247bccf1617351cf6712b3457a0e91446ba53
                                name:
                                  type: string
                                  example: 주식회사 플랫큐브
                                channelName:
                                  type: string
                                  nullable: true
                                  example: 플랫큐브
                            hasButton1:
                              type: boolean
                              example: true
                            hasButton2:
                              type: boolean
                              example: false
                            updatedAt:
                              type: string
                              format: date-time
                              example: "2026-04-24T02:00:00.000Z"
                  error:
                    nullable: true
                    example: null
        "401":
          description: accessToken 검증 실패
