/api/v1/client/auth/user-refresh:
  post:
    tags:
      - Client Auth
    summary: 외주업체 사용자 액세스 토큰 재발급
    description: |
      HttpOnly 쿠키에 저장된 refresh token을 이용해 새 access token을 발급합니다.
      성공 시 refresh token도 새로 발급되며, 기존 refresh token은 폐기됩니다.
    responses:
      "200":
        description: 토큰 재발급 성공
        headers:
          Set-Cookie:
            description: 새 refresh token HttpOnly 쿠키
            schema:
              type: string
              example: client_refresh_token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...; HttpOnly; Path=/api/v1/client/auth
        content:
          application/json:
            schema:
              type: object
              required:
                - success
                - data
                - error
              properties:
                success:
                  type: boolean
                  example: true
                data:
                  type: object
                  required:
                    - accessToken
                  properties:
                    accessToken:
                      type: string
                      description: 새로 발급된 액세스 토큰
                      example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                error:
                  nullable: true
                  example: null
      "401":
        description: refresh token 누락, 만료, 폐기 또는 검증 실패
        content:
          application/json:
            schema:
              type: object
              required:
                - success
                - data
                - error
              properties:
                success:
                  type: boolean
                  example: false
                data:
                  nullable: true
                  example: null
                error:
                  type: object
                  properties:
                    code:
                      type: string
                      example: AUTH_401_UNAUTHORIZED
                    message:
                      type: string
                      example: 유효하지 않은 리프레시 토큰입니다.
                    details:
                      nullable: true
